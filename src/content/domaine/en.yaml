  eyebrow: "Estate visits"
  title: "Come and experience"
  titleHighlight: "the estate"
  body: "Make an appointment to tour the vineyards, discover the winery and taste our wines in an authentic setting."
  details:
    - "Duration: 1h30"
    - "By reservation"
    - "Welcome in FR / EN"
    - "Private groups on request"
  primaryCta:
    label: "Book a visit to the estate"
    href: "/en/visits#booking"
  secondaryCta:
    label: "Contact us"
    href: "#domaine-contact"
  image: "../../assets/perinade/domaine/visit-cta.jpg"
  imageAlt: "Bottles lined up in the cellar"

