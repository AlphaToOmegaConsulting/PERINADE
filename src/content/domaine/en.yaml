theme:
  sectionDesktop: "6.2rem"
  sectionTablet: "5rem"
  sectionMobile: "3.8rem"

seo:
  title: "The Estate | Domaine de la Périnade"
  description: "Discover the history of Domaine de la Périnade, its terroir, wines and visiting opportunities in the heart of Minervois."

hero:
  eyebrow: "The Estate"
  titleLines:
    - "Since 1830,"
    - "nurturing the terroir"
  body: "Between the Canal du Midi and the Fresquel river, Domaine de la Périnade carries on six generations of viticulture across 100 ha, including 40 ha of vines. A family story rooted in the Minervois, revived in 2019 with exacting standards."
  primaryCta:
    label: "Book a visit to the estate"
    href: "/en/visits#booking"
  secondaryCta:
    label: "Discover our wines"
    href: "/en/shop"
  badges:
    - "Viticulture"
    - "Terroir"
    - "Heritage"
  highlights:
    - "100 ha estate"
    - "40 ha of vines"
    - "6 generations"
    - "Minervois · Languedoc"
  image: "../../assets/perinade/domaine/hero.jpg"
  imageAlt: "Person checking their phone at dusk in the estate"

terroir:
  eyebrow: "Terroir & Expertise"
  title: "An exceptional location"
  body: "The estate stretches between the Canal du Midi and the Fresquel river, within the AOP Minervois appellation. This rare geographical setting — between water and garrigue — shapes the minerality and freshness of our wines."
  grapesTitle: "Grape varieties"
  commitmentsTitle: "Environmental commitments"
  grapes:
    - "Grenache Noir"
    - "Cabernet Franc"
    - "Cabernet Sauvignon"
    - "Merlot"
  commitments:
    - title: "HVE approach"
      body: "High Environmental Value — certification in progress."
    - title: "Zero glyphosate"
      body: "Complete elimination of herbicides; mechanical weeding between rows."
    - title: "Managed cover cropping"
      body: "Controlled cover-crop management to preserve soil biodiversity."
  image: "../../assets/perinade/domaine/terroir.jpg"
  imageAlt: "Mountain landscape at sunrise"

family:
  eyebrow: "The family"
  title: "The Arnal family today"
  body:
    - "In 2019, the 6th and 7th generations of the Arnal family took over the estate with the ambition of restoring this historic terroir to its full glory."
    - "The construction of the winery in 2020, the restoration of the cellars and the plot-by-plot selection marked a fresh start. The goal remains the same: to produce wines that are precise, elegant and true to their origin."
    - "At the estate, heritage is a daily reality: precision in the vineyard, attentiveness to each vintage, and hospitality at every visit."
  milestones:
    - year: "1830"
      label: "Foundation"
    - year: "2019"
      label: "Revival"
    - year: "2020"
      label: "1st winery"
  image: "../../assets/perinade/domaine/family.jpg"
  imageAlt: "Dream Big inscription on a dark background"

