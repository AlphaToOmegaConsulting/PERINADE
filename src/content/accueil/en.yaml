history:
  eyebrow: Our story
  title: Six generations of
  titleHighlight: passion
  body:
    - Founded in 1830, Domaine de la Périnade is a family adventure born from a
      love of the Languedoc terroir. On these sun-drenched lands between
      garrigue and hills, we cultivate our vines with respect for tradition and
      particular attention to the environment.
    - Today, the sixth generation carries on this expertise, blending ancestral
      methods with modern winemaking to produce wines that express the
      uniqueness of our terroir.
  imagePrimary: ../../assets/perinade/history-family.png
  ctaLabel: Discover the full story
  ctaHref: /en/domaine
wines:
  eyebrow: Our wines
  title: Selected vintages
  allWinesLabel: View all wines
  allWinesHref: /en/shop
  items:
    - image: ../../assets/perinade/wine-cuvee-domaine.png
      title: Cuvée du Domaine
      subtitle: Red · AOP Minervois
      description: A silky red with notes of dark fruit, garrigue and sweet spices,
        crafted to accompany fine dining.
    - image: ../../assets/perinade/wine-blanc.png
      title: Blanc de Périnade
      subtitle: White · IGP Pays d'Oc
      description: A fresh and floral vintage, carried by citrus, mineral tension and
        a clean finish.
    - image: ../../assets/perinade/wine-rose.png
      title: Rosé d'Été
      subtitle: Rosé · IGP Pays d'Oc
      description: A luminous rosé with hints of white peach and strawberry, designed
        for summer meals and apéritifs.
    - image: ../../assets/perinade/wine-grande-reserve.png
      title: Grande Réserve
      subtitle: Red · AOP Minervois
      description: A wine of character aged in oak barrels, full-bodied and
        persistent, with smooth tannins and deep substance.
