seo:
  title: "Visits & Tastings | Domaine de la Périnade"
  description: "Book your estate visit: stroll through the vineyards, discover the cellar, enjoy a guided tasting and gourmet options."

hero:
  eyebrow: "Visits & Tastings"
  titleLines:
    - "Discover the Languedoc"
    - "glass in hand"
  body: "A guided immersion led by the winemaker: walk through the vines, tour the cellar and taste 5 vintages in an exceptional family setting."
  badges:
    - icon: "clock"
      label: "1h30"
    - icon: "ticket"
      label: "From 15 €"
    - icon: "globe"
      label: "FR / EN"
    - icon: "calendar"
      label: "11am – 4pm, every day"
    - icon: "car"
      label: "Free parking"
  primaryCta:
    label: "Book now"
    href: "/en/visits#booking"
  secondaryCta:
    label: "Call us"
    href: "tel:+33468000000"
  helper: "+33 4 68 XX XX XX · Reply within 24h"
  image: "../../assets/perinade/visits/hero-grapes.jpg"
  imageAlt: "Freshly harvested grapes in a vat"

trustBar:
  - "4.9/5 based on 127 reviews"
  - "Languedoc Wine Tourism Excellence"
  - "Guided by the winemaker"

timeline:
  eyebrow: "Your journey"
  title: "The experience step by step"
  body: "1h30 of total immersion in the world of wine, guided by our winemaker."
  steps:
    - id: "step-1"
      number: "01"
      title: "Welcome by the winemaker"
      body: "A warm welcome in the heart of the estate. The winemaker introduces you to the family history and the philosophy of the house."
      image: "../../assets/perinade/visits/step-1.jpg"
      imageAlt: "Grapes in a vat, first step of the visit"
      layout:
        mediaRatio: "568/366"
        mediaMaxWidth: "30rem"
        contentMaxWidth: "24rem"
        align: "center"
    - id: "step-2"
      number: "02"
      title: "Walk through the vines"
      body: "Discover the Languedoc terroir, grape varieties and cultivation methods. An immersion amid garrigue scrubland and sun-drenched hills."
      image: "../../assets/perinade/visits/step-2.jpg"
      imageAlt: "Vineyard path and estate vegetation"
      layout:
        mediaRatio: "568/420"
        mediaMaxWidth: "21rem"
        contentMaxWidth: "25rem"
        align: "start"
    - id: "step-3"
      number: "03"
      title: "Cellar tour & winemaking"
      body: "Explanation of winemaking techniques, from the harvest to the oak barrels. Understand the process that brings our vintages to life."
      image: "../../assets/perinade/visits/step-3.jpg"
      imageAlt: "Inside the cellar with oak barrels"
      layout:
        mediaRatio: "568/420"
        mediaMaxWidth: "21rem"
        contentMaxWidth: "24rem"
        align: "start"
    - id: "step-4"
      number: "04"
      title: "Guided tasting"
      body: "Savour 5 selected wines — 1 rosé, 3 whites and 1 red — with the winemaker's passionate commentary."
      image: "../../assets/perinade/visits/step-4.jpg"
      imageAlt: "Tasting glasses at the end of the visit"
      layout:
        mediaRatio: "568/368"
        mediaMaxWidth: "21rem"
        contentMaxWidth: "25rem"
        align: "center"

wines:
  eyebrow: "The tasting"
  title: "5 vintages to discover"
  body: "1 rosé, 3 whites and 1 red — a curated selection with commentary by the winemaker."
  cards:
    - id: "wine-rose"
      tag: "1 ROSÉ"
      tagTone: "rose"
      title: "Summer Rosé"
      notes:
        - "Peach, strawberry"
        - "Lively and full-flavoured palate"
      image: "../../assets/perinade/visits/wine-rose-card.jpg"
      imageAlt: "Bottles and rosé notes"
    - id: "wine-white"
      tag: "3 WHITE"
      tagTone: "white"
      title: "Périnade Whites"
      notes:
        - "Citrus, white flowers"
        - "Mineral freshness"
      image: "../../assets/perinade/visits/wine-white-card.jpg"
      imageAlt: "Bottle of white wine from the estate"
    - id: "wine-red"
      tag: "1 RED"
      tagTone: "red"
      title: "Grande Réserve"
      notes:
        - "Dark fruits, garrigue"
        - "Silky tannins, long finish"
      image: "../../assets/perinade/visits/wine-red-card.jpg"
      imageAlt: "Selection of red wines in the cellar"

pairing:
  image: "../../assets/perinade/visits/pairing-board.jpg"
  imageAlt: "Cheese board and accompaniments"
  eyebrow: "Available option"
  title:
    - "Cheese board"
    - "& charcuterie"
  body: "Extend the experience with a selection of aged cheeses and artisan charcuterie from the region, perfectly paired with our vintages. Ideal for turning your tasting into a convivial moment."
  bullets:
    - "Local aged cheeses"
    - "Artisan Languedoc charcuterie"
    - "Country bread & house-made condiments"
  note: "Add this option when booking online."

pricing:
  eyebrow: "Visit Options"
  title: "Choose Your Format"
  body: "Flexible formats, including private and large groups on request."
  layout:
    containerMaxWidth: "50rem"
    cardMinHeight: "22rem"
    cardPadding: "1.45rem"
    titleSize: "1.7rem"
    priceSize: "2.2rem"
  plans: []
  meta:
    - "Available daily, 11:00 – 16:00"
    - "Private groups on request"
    - "Premium experience, fair pricing"

access:
  eyebrow: "Easy to Reach"
  title: "Easy to Reach"
  body: "Accessible from Carcassonne, with a straightforward welcome for visits as a couple, family or group."
  leftCard:
    icon: "pin"
    tag: "Address"
    title: "Carcassonne"
    subtitle: "Aude, Occitanie"
    content:
      - "Domaine de la Périnade"
      - "GPS coordinates shared after booking"
      - "Free visitor parking"
    ctaLabel: "View on map"
    ctaHref: "https://maps.google.com/?q=Domaine+de+la+Perinade+Minervois+Languedoc"
  rightCards:
    - icon: "car"
      tag: "Most convenient"
      title: "By car"
      subtitle: "Most convenient"
      content:
        - "15 min from Carcassonne"
        - "Direct access and on-site parking"
    - icon: "plane"
      tag: "Airport"
      title: "From airport"
      subtitle: "Carcassonne Airport"
      content:
        - "20 min by car"
        - "Taxis and ride services available"
    - icon: "train"
      tag: "Train + transfer"
      title: "Train + transfer"
      subtitle: "Carcassonne Station"
      content:
        - "25 min with transfer"
        - "Ideal for a wine tourism stay"

escape:
  image: "../../assets/perinade/visits/extended-pool.jpg"
  imageAlt: "Pool and cypress trees at the estate"
  layout:
    backgroundImage: "../../assets/perinade/visits/extended-pool.jpg"
    overlayOpacity: 0.72
    imagePanelRadius: "1rem"
  eyebrow: "Extended Experience"
  title:
    - "Extend your"
    - "getaway"
  body: "The estate features a landscaped park, a swimming pool with panoramic vineyard views, and can host your private events and receptions. A natural extension of your visit."
  features:
    - icon: "tree"
      label: "Private landscaped park"
    - icon: "pool"
      label: "Pool with vineyard views"
    - icon: "event"
      label: "Bespoke events & receptions"
  cta:
    label: "Contact us for private hire"
    href: "/en#contact"

