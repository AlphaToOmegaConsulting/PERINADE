  image: "../../assets/perinade/visits/final-cta-bg.jpg"
  imageAlt: "Cellar preparation for the visit"
  layout:
    contentMaxWidth: "34rem"
    eyebrowToTitleGap: "0.55rem"
    titleToBodyGap: "0.6rem"
