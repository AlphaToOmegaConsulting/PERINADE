seo:
  title: "Visitas y Degustaciones | Domaine de la Périnade"
  description: "Reserve su visita a la finca: paseo por los viñedos, descubrimiento de la bodega, degustación guiada y opciones gastronómicas."

hero:
  eyebrow: "Visitas y Degustaciones"
  titleLines:
    - "Descubra el Languedoc"
    - "copa en mano"
  body: "Una inmersión guiada por el enólogo: paseo entre las viñas, visita a la bodega y degustación de 5 vinos en un entorno familiar excepcional."
  badges:
    - icon: "clock"
      label: "1h30"
    - icon: "ticket"
      label: "Desde 15 €"
    - icon: "globe"
      label: "FR / EN / ES"
    - icon: "calendar"
      label: "11:00 – 16:00, todos los días"
    - icon: "car"
      label: "Aparcamiento gratuito"
  primaryCta:
    label: "Reservar"
    href: "/es/visitas#booking"
  secondaryCta:
    label: "Llamar"
    href: "tel:+33468000000"
  helper: "+33 4 68 XX XX XX · Respuesta en 24h"
  image: "../../assets/perinade/visits/hero-grapes.jpg"
  imageAlt: "Uvas recién cosechadas en una cuba"

trustBar:
  - "4,9/5 basado en 127 opiniones"
  - "Excelencia en Enoturismo del Languedoc"
  - "Guiado por el enólogo"

timeline:
  eyebrow: "Su recorrido"
  title: "La experiencia paso a paso"
  body: "1h30 de inmersión total en el mundo del vino, guiado por nuestro enólogo."
  steps:
    - id: "step-1"
      number: "01"
      title: "Bienvenida por el enólogo"
      body: "Una cálida bienvenida en el corazón de la finca. El enólogo le presenta la historia familiar y la filosofía de la casa."
      image: "../../assets/perinade/visits/step-1.jpg"
      imageAlt: "Uvas en una cuba, primera etapa de la visita"
      layout:
        mediaRatio: "568/366"
        mediaMaxWidth: "30rem"
        contentMaxWidth: "24rem"
        align: "center"
    - id: "step-2"
      number: "02"
      title: "Paseo por los viñedos"
      body: "Descubra el terruño del Languedoc, las variedades de uva y los métodos de cultivo. Una inmersión entre garriga y colinas bañadas por el sol."
      image: "../../assets/perinade/visits/step-2.jpg"
      imageAlt: "Camino entre viñedos y vegetación de la finca"
      layout:
        mediaRatio: "568/420"
        mediaMaxWidth: "21rem"
        contentMaxWidth: "25rem"
        align: "start"
    - id: "step-3"
      number: "03"
      title: "Visita a la bodega y vinificación"
      body: "Explicación de las técnicas de vinificación, desde la vendimia hasta las barricas de roble. Comprenda el proceso que da vida a nuestros vinos."
      image: "../../assets/perinade/visits/step-3.jpg"
      imageAlt: "Interior de la bodega con barricas"
      layout:
        mediaRatio: "568/420"
        mediaMaxWidth: "21rem"
        contentMaxWidth: "24rem"
        align: "start"
    - id: "step-4"
      number: "04"
      title: "Degustación comentada"
      body: "Saboree 5 vinos seleccionados — 1 rosado, 3 blancos y 1 tinto — con los comentarios apasionados del enólogo."
      image: "../../assets/perinade/visits/step-4.jpg"
      imageAlt: "Copas de degustación al final de la visita"
      layout:
        mediaRatio: "568/368"
        mediaMaxWidth: "21rem"
        contentMaxWidth: "25rem"
        align: "center"

wines:
  eyebrow: "La degustación"
  title: "5 vinos por descubrir"
  body: "1 rosado, 3 blancos y 1 tinto — una selección comentada por el enólogo."
  cards:
    - id: "wine-rose"
      tag: "1 ROSADO"
      tagTone: "rose"
      title: "Rosado de Verano"
      notes:
        - "Melocotón, fresa"
        - "Paladar vivo y afrutado"
      image: "../../assets/perinade/visits/wine-rose-card.jpg"
      imageAlt: "Botellas y tonos rosados"
    - id: "wine-white"
      tag: "3 BLANCO"
      tagTone: "white"
      title: "Blancos de Périnade"
      notes:
        - "Cítricos, flores blancas"
        - "Frescura mineral"
      image: "../../assets/perinade/visits/wine-white-card.jpg"
      imageAlt: "Botella de vino blanco de la finca"
    - id: "wine-red"
      tag: "1 TINTO"
      tagTone: "red"
      title: "Gran Reserva"
      notes:
        - "Frutos negros, garriga"
        - "Taninos sedosos, final largo"
      image: "../../assets/perinade/visits/wine-red-card.jpg"
      imageAlt: "Selección de vinos tintos en bodega"

pairing:
  image: "../../assets/perinade/visits/pairing-board.jpg"
  imageAlt: "Tabla de quesos y acompañamientos"
  eyebrow: "Opción disponible"
  title:
    - "Tabla de quesos"
    - "y embutidos"
  body: "Prolongue la experiencia con una selección de quesos curados y embutidos artesanales de la región, perfectamente maridados con nuestros vinos. Ideal para convertir su degustación en un momento de convivencia."
  bullets:
    - "Quesos curados locales"
    - "Embutidos artesanales del Languedoc"
    - "Pan de campo y condimentos caseros"
  note: "Añada esta opción al realizar su reserva en línea."

pricing:
  eyebrow: "Opciones de visita"
  title: "Elija su formato"
  body: "Formatos flexibles, incluyendo grupos privados y grandes a petición."
  layout:
    containerMaxWidth: "50rem"
    cardMinHeight: "22rem"
    cardPadding: "1.45rem"
    titleSize: "1.7rem"
    priceSize: "2.2rem"
  plans: []
  meta:
    - "Disponible todos los días, 11:00 – 16:00"
    - "Grupos privados a petición"
    - "Experiencia premium, precio justo"

access:
  eyebrow: "Fácil acceso"
  title: "Fácil de llegar"
  body: "Accesible desde Carcassonne, con una acogida sencilla para visitas en pareja, en familia o en grupo."
  leftCard:
    icon: "pin"
    tag: "Dirección"
    title: "Carcassonne"
    subtitle: "Aude, Occitania"
    content:
      - "Domaine de la Périnade"
      - "Coordenadas GPS compartidas tras la reserva"
      - "Aparcamiento gratuito para visitantes"
    ctaLabel: "Ver en el mapa"
    ctaHref: "https://maps.google.com/?q=Domaine+de+la+Perinade+Minervois+Languedoc"
  rightCards:
    - icon: "car"
      tag: "Lo más práctico"
      title: "En coche"
      subtitle: "Lo más cómodo"
      content:
        - "15 min desde Carcassonne"
        - "Acceso directo y aparcamiento en el lugar"
    - icon: "plane"
      tag: "Aeropuerto"
      title: "Desde el aeropuerto"
      subtitle: "Aeropuerto de Carcassonne"
      content:
        - "20 min en coche"
        - "Taxis y VTC disponibles"
    - icon: "train"
      tag: "Tren + traslado"
      title: "Tren + traslado"
      subtitle: "Estación de Carcassonne"
      content:
        - "25 min con traslado"
        - "Ideal para una estancia de enoturismo"

escape:
  image: "../../assets/perinade/visits/extended-pool.jpg"
  imageAlt: "Piscina y cipreses en la finca"
  layout:
    backgroundImage: "../../assets/perinade/visits/extended-pool.jpg"
    overlayOpacity: 0.72
    imagePanelRadius: "1rem"
  eyebrow: "Experiencia ampliada"
  title:
    - "Prolongue su"
    - "escapada"
  body: "La finca dispone de un parque arbolado, una piscina con vistas panorámicas a los viñedos, y puede acoger sus eventos privados y recepciones. Una extensión natural de su visita."
  features:
    - icon: "tree"
      label: "Parque arbolado privatizable"
    - icon: "pool"
      label: "Piscina con vistas a los viñedos"
    - icon: "event"
      label: "Eventos y recepciones a medida"
  cta:
    label: "Contáctenos para privatizar"
    href: "/es#contact"

