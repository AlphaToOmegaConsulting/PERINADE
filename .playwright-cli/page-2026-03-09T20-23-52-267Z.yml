        - heading "Trois générations de passion" [level=2] [ref=e193]
        - paragraph [ref=e194]: Fondé en 1830, le Domaine de la Périnade est une aventure familiale née de l'amour du terroir languedocien. Sur ces terres baignées de soleil, entre garrigue et collines, nous cultivons nos vignes dans le respect des traditions et avec une attention particulière portée à l'environnement.
        - paragraph [ref=e195]: Aujourd'hui, c'est la troisième génération qui perpétue ce savoir-faire, alliant méthodes ancestrales et vinification moderne pour produire des vins qui expriment la singularité de notre terroir.
