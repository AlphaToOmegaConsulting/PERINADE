name = "perinade-dev-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
account_id = "aea813e220eb8b709d70698a80ded18e"

[[d1_databases]]
binding = "DB"
database_name = "perinade-dev-db"
database_id = "69f84eaf-2291-44c5-bf6f-eaa4b8c1d46f"

[[kv_namespaces]]
binding = "CACHE"
id = "eb0dfc6944b74a048e140b36e74b13be"

[[routes]]
# Admin routes — protected by Cloudflare Access
pattern = "perinade.alpha2omegaconsulting.com/api/admin/*"
zone_id = "3de818ba26d525ef6b866487c8cf2b21"

[[routes]]
# User account routes — protected by Supabase JWT (ES256)
pattern = "perinade.alpha2omegaconsulting.com/api/user/*"
zone_id = "3de818ba26d525ef6b866487c8cf2b21"

[[routes]]
# Auth routes — session management
pattern = "perinade.alpha2omegaconsulting.com/api/auth/*"
zone_id = "3de818ba26d525ef6b866487c8cf2b21"

[vars]
CF_ACCESS_TEAM = "your-team-name"   # replace with Cloudflare Access team name
CF_ACCESS_AUD = "your-aud-tag"      # replace with CF Access Application Audience tag
SUPABASE_URL = "https://ieuaozyzffcmmrgigivc.supabase.co"
